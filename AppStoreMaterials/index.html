<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>来记个账 - 支持中心</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            line-height: 1.8;
            color: #333;
            background: #f5f5f7;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 540px;
            text-align: center;
            padding: 40px 24px;
        }
        .logo {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 24px;
            box-shadow: 0 8px 24px rgba(255,107,107,0.25);
        }
        h1 { font-size: 28px; font-weight: 700; color: #1d1d1f; margin-bottom: 8px; }
        p.subtitle { font-size: 16px; color: #86868b; margin-bottom: 32px; }
        .card {
            background: #fff;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            text-align: left;
            box-shadow: 0 2px 12px rgba(0,0,0,0.04);
        }
        .card h2 { font-size: 16px; font-weight: 600; color: #1d1d1f; margin-bottom: 8px; }
        .card p, .card a { font-size: 14px; color: #666; }
        .card a { color: #0071e3; text-decoration: none; }
        footer {
            margin-top: 32px;
            font-size: 13px;
            color: #b0b0b0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">💰</div>
        <h1>来记个账</h1>
        <p class="subtitle">前任现任钱财往来轻松记</p>

        <div class="card">
            <h2>📧 联系支持</h2>
            <p>如有任何问题或建议，请发邮件至：<br><a href="mailto:pongtom@qq.com">pongtom@qq.com</a></p>
        </div>

        <div class="card">
            <h2>🔒 隐私政策</h2>
            <p>来记个账完全在本地运行，不收集任何个人信息。<br>
            <a href="privacy.html">查看完整隐私政策 →</a></p>
        </div>

        <div class="card">
            <h2>📱 关于 App</h2>
            <p>版本 1.0 · iOS 17.0+<br>
            专为亲密关系设计的记账工具，清晰记录与每个人之间的每一笔往来。</p>
        </div>

        <footer>
            <p>© 2026 来记个账</p>
        </footer>
    </div>
</body>
</html>
