name: WangLaiZhangBen
options:
  bundleIdPrefix: com.pangtong
  deploymentTarget:
    iOS: "17.0"
targets:
  WangLaiZhangBen:
    type: application
    platform: iOS
    sources:
      - path: .
        name: WangLaiZhangBen
        excludes:
          - "**/*.yml"
          - "**/*.md"
    dependencies:
      - framework: Charts
        type: sdk
    settings:
      INFOPLIST_FILE: WangLaiZhangBen/Info.plist
      PRODUCT_BUNDLE_IDENTIFIER: com.pangtong.WangLaiZhangBen
      PRODUCT_NAME: WangLaiZhangBen
      SWIFT_VERSION: "5.0"
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
      ENABLE_USER_SCRIPT_SANDBOXING: NO
    info:
      path: WangLaiZhangBen/Info.plist
      properties:
        CFBundleDevelopmentRegion: $(DEVELOPMENT_LANGUAGE)
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIconName: AppIcon
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleInfoDictionaryVersion: "6.0"
        CFBundleName: 来记个账
        CFBundleDisplayName: 来记个账
        CFBundlePackageType: APPL
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen:
          UILaunchScreen:
        UIRequiredDeviceCapabilities:
          - arm64
        UIRequiresFullScreen: false
        UIStatusBarHidden: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIUserInterfaceStyle: Automatic
